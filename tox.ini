[tox]
envlist = begin,py3{10,11,12,13,14},end
          py3{10,11,12,13,14}-functional
          ruff,ruff-check,mypy
minversion = 2.0
skipsdist = false
skip_missing_interpreters = true

[testenv]
runner = uv-venv-lock-runner
extras =
  test
setenv =
  PACKAGE_NAME=genesis_s3
  TEST_PATH={env:PACKAGE_NAME}/tests/unit
  functional: TEST_PATH={env:PACKAGE_NAME}/tests/functional
  functional: DATABASE_URI={env:DATABASE_URI:postgresql://genesis_s3:pass@localhost:5432/genesis_s3}
  functional: NO_PROXY={env:NO_PROXY:10.20.0.0/22,localhost,127.0.0.1}
pass_env =
  GENESIS_*
  HOME
  NO_PROXY
  no_proxy
  HTTP_PROXY
  HTTPS_PROXY
  ALL_PROXY
commands =
  coverage run -p -m pytest {posargs} --timer-top-n=10 {env:TEST_PATH}

[testenv:begin]
runner = uv-venv-lock-runner
envdir = {toxworkdir}/cover
commands =
  coverage erase

[testenv:end]
runner = uv-venv-lock-runner
envdir = {toxworkdir}/cover
commands =
  coverage combine
  coverage html -d cover
  coverage xml -o cover/coverage.xml
  coverage report --skip-covered

[testenv:ruff-check]
extras =
  ruff
runner = uv-venv-lock-runner
commands = ruff check .

[testenv:ruff]
extras =
  ruff
runner = uv-venv-lock-runner
commands = ruff format

[testenv:mypy]
extras =
  mypy
runner = uv-venv-lock-runner
commands = mypy -p genesis_s3

[testenv:develop]
runner = uv-venv-lock-runner
extras =
  test
usedevelop=true

[testenv:docs]
extras =
  docs
runner = uv-venv-lock-runner
commands = mkdocs serve --dev-addr 0.0.0.0:8181 --livereload

[testenv:docs-deploy]
extras =
  docs
runner = uv-venv-lock-runner
commands = mkdocs gh-deploy --force
