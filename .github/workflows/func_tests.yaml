name: func_tests

on:
  push:
  pull_request:
    types: [opened]

env:
  PACKER_VERSION: "latest"
  PYTHON_VERSION: "3.12"
  # metapaas and s3aas branches to test against
  METAPAAS_BRANCH: "master"
  CORE_BRANCH: "master"

jobs:
  Func_tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup packer
        uses: hashicorp/setup-packer@main
        with:
          version: ${{ env.PACKER_VERSION }}

      - name: Set up QEMU / libvirt
        run: |
          sudo apt -y update
          sudo apt install -y qemu-system-amd64 qemu-kvm qemu-utils \
            libvirt-daemon-system libvirt-dev mkisofs zip libev-dev
          sudo adduser $USER libvirt
          sudo adduser $USER kvm
          sudo chmod +666 /dev/kvm
          sudo virsh pool-define-as default dir --target "/var/lib/libvirt/images/"
          sudo virsh pool-build default
          sudo virsh pool-start default
          sudo virsh pool-autostart default
          sudo sh -c 'printf "listen_tcp = 1\nlisten_addr = \"0.0.0.0\"\nauth_tcp = \"none\"\n" >> /etc/libvirt/libvirtd.conf'
          sudo systemctl stop libvirtd
          sudo systemctl enable --now libvirtd-tcp.socket
          sudo systemctl start libvirtd

      - name: Install exordos CLI
        run: curl -fsSL https://repo.exordos.com/install.sh | sudo sh

      - name: Install uv + tox
        uses: astral-sh/setup-uv@v7
      - run: uv tool install tox --with tox-uv

      - name: Build exordos_core
        run: |
          cd ../
          git clone -b "$CORE_BRANCH" https://github.com/exordos/exordos_core.git
          cd exordos_core
          exordos build -f . --manifest-var repository=https://repo.exordos.com
          cd $GITHUB_WORKSPACE

      - name: Bootstrap exordos_core
        run: |
          cd ../exordos_core
          exordos bootstrap -i ./output/inventory.json -f -m core \
            --hyper-storage-pool default \
            --save-admin-password-file ./admin_password.txt
          echo "ADMIN_PASSWORD=$(cat ./admin_password.txt)" >> $GITHUB_ENV
          sudo curl https://repo.exordos.com/1af41041/latest/1af41041.rom \
            --output /usr/share/qemu/1af41041.rom
          cd $GITHUB_WORKSPACE

      - name: Wait for Exordos Core API
        run: |
          for i in {1..60}; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" http://10.20.0.2:11010)
            if echo "$CODE" | grep -qE "200|401|403"; then
              echo "Core API ready (HTTP $CODE)"
              exit 0
            fi
            echo "Waiting ($i/60)…"
            sleep 5
          done
          exit 1

      - name: Configure hypervisor with overbooking
        run: |
          ADMIN_TOKEN=$(curl -s http://10.20.0.2:11010/v1/iam/clients/00000000-0000-0000-0000-000000000000/actions/get_token/invoke \
            -H 'Content-Type: application/x-www-form-urlencoded' \
            --data-urlencode 'grant_type=password' \
            --data-urlencode 'username=admin' \
            --data-urlencode "password=$ADMIN_PASSWORD" \
            --data-urlencode 'client_id=GenesisCoreClientId' \
            --data-urlencode 'client_secret=GenesisCoreSecret' \
            --data-urlencode 'ttl=3600' | jq -r .access_token)
          echo "ADMIN_TOKEN=$ADMIN_TOKEN" >> $GITHUB_ENV
          curl -s http://10.20.0.2:11010/v1/compute/hypervisors/ \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -d '{
              "uuid": "63d6caf1-c452-4697-9d03-b4579612c1f5",
              "name": "hypervisor",
              "driver_spec": {
                "driver": "libvirt",
                "iface_mtu": 1500,
                "network_type": "network",
                "network": "exordos-core-net",
                "storage_pool": "default",
                "connection_uri": "qemu+tcp://10.20.0.1/system",
                "machine_prefix": "dev-"
              },
              "machine_type": "VM",
              "cores_ratio": 10.0,
              "ram_ratio": 10.0
            }'

      - name: Build exordos_metapaas image
        run: |
          cd ../
          git clone -b "$METAPAAS_BRANCH" https://github.com/infraguys/exordos_metapaas.git
          cd exordos_metapaas
          exordos build -f . --manifest-var repository=https://repo.exordos.com
          cd $GITHUB_WORKSPACE

      - name: Build metapaas_s3 manifests + wheel
        run: |
          # Build wheel and publish to local pip index
          uv build --wheel
          LOCAL_REPO="http://10.20.0.1:8080"
          WHEEL=$(ls dist/exordos_paas_s3-*.whl)
          # Build manifests with local repository (the DP image was built alongside)
          exordos build -c exordos/exordos.yaml -f \
            --manifest-var repository="${LOCAL_REPO}/exordos-elements" \
            --manifest-var index_url="${LOCAL_REPO}/simple/"

      - name: Publish metapaas image + s3aas manifest to local repo
        run: |
          # metapaas
          MP_VER=$(cat ../exordos_metapaas/output/manifests/metapaas.yaml | grep '"version"' | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          sudo mkdir -p /srv/exordos-local-repo/exordos-elements/metapaas/${MP_VER}/images
          sudo cp ../exordos_metapaas/output/images/exordos-metapaas.raw.zst \
            /srv/exordos-local-repo/exordos-elements/metapaas/${MP_VER}/images/
          sudo cp ../exordos_metapaas/output/manifests/metapaas.yaml \
            /srv/exordos-local-repo/exordos-elements/metapaas/${MP_VER}/

          # s3aas: manifest + DP image
          sudo mkdir -p /srv/exordos-local-repo/exordos-elements/s3aas/0.0.1/images
          sudo cp output/images/exordos-metapaas-s3-dp.raw.zst \
            /srv/exordos-local-repo/exordos-elements/s3aas/0.0.1/images/
          sudo cp output/manifests/s3aas.yaml \
            /srv/exordos-local-repo/exordos-elements/s3aas/0.0.1/

          # wheel
          sudo mkdir -p /srv/exordos-local-repo/simple
          sudo cp dist/exordos_paas_s3-*.whl /srv/exordos-local-repo/simple/

      - name: Install metapaas element
        run: |
          exordos -e http://10.20.0.2:11010 -u admin -p "$ADMIN_PASSWORD" \
            ee install metapaas --repository http://10.20.0.1:8080/exordos-elements

      - name: Wait for metapaas CP node ACTIVE
        run: |
          for i in {1..60}; do
            STATUS=$(exordos -e http://10.20.0.2:11010 -u admin -p "$ADMIN_PASSWORD" \
              cn list 2>/dev/null | grep metapaas | grep -oE "ACTIVE|IN_PRO|ERROR" | head -1)
            if [ "$STATUS" = "ACTIVE" ]; then echo "metapaas CP ACTIVE"; break; fi
            echo "Waiting ($i/60) status=$STATUS"; sleep 15
          done
          CP_IP=$(exordos -e http://10.20.0.2:11010 -u admin -p "$ADMIN_PASSWORD" \
            cn list 2>/dev/null | grep metapaas | grep -oE "10\.[0-9.]+")
          echo "METAPAAS_CP_IP=$CP_IP" >> $GITHUB_ENV

      - name: Install s3aas + wait for PluginReconciler
        run: |
          exordos -e http://10.20.0.2:11010 -u admin -p "$ADMIN_PASSWORD" \
            ee install s3aas --repository http://10.20.0.1:8080/exordos-elements
          for i in {1..30}; do
            STATUS=$(exordos -e http://10.20.0.2:11010 -u admin -p "$ADMIN_PASSWORD" \
              ee list 2>/dev/null | grep "s3aas" | grep -oE "ACTIVE|IN_PRO|ERROR" | head -1)
            if [ "$STATUS" = "ACTIVE" ]; then echo "s3aas ACTIVE"; break; fi
            echo "Waiting ($i/30) s3aas=$STATUS"; sleep 20
          done

      - name: Get metapaas IAM password
        run: |
          MP_PASS=$(exordos -e http://10.20.0.2:11010 -u admin -p "$ADMIN_PASSWORD" \
            cn ssh metapaas-cp -- cat /etc/exordos_init.txt 2>/dev/null \
            | grep IAM_USER_PASS | cut -d= -f2 || echo "metapaas")
          echo "METAPAAS_PASSWORD=$MP_PASS" >> $GITHUB_ENV

      - name: Run functional tests
        env:
          EXORDOS_ENDPOINT: http://10.20.0.2:11010
          EXORDOS_USERNAME: admin
          EXORDOS_PASSWORD: ${{ env.ADMIN_PASSWORD }}
          METAPAAS_USERNAME: metapaas
          METAPAAS_PASSWORD: ${{ env.METAPAAS_PASSWORD }}
          EXORDOS_S3_CP_URL: http://${{ env.METAPAAS_CP_IP }}:8080
          EXORDOS_POLL_TIMEOUT: 600
          EXORDOS_POLL_INTERVAL: 15
        run: tox -e ${{ env.PYTHON_VERSION }}-functional

      - name: Debug session on failure
        uses: owenthereal/action-upterm@v1
        if: failure()
        with:
          limit-access-to-actor: true
          wait-timeout-minutes: 30
