name: func_tests

on:
  push:
  pull_request:
    types: [opened]

env:
  PACKER_VERSION: "latest"
  PYTHON_VERSION: "3.12"
  CORE_BRANCH: "master"
  # Space-separated list of elements to install as dependencies
  ELEMENT_DEPS: "dbaas"

jobs:
  Func_tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Setup `packer`
        uses: hashicorp/setup-packer@main
        with:
          version: ${{ env.PACKER_VERSION }}
      - name: Set up QEMU
        run: |
          sudo apt -y update
          sudo apt install -y qemu-system-amd64 qemu-kvm qemu-utils libvirt-daemon-system libvirt-dev mkisofs zip
          sudo adduser $USER libvirt
          sudo adduser $USER kvm
          sudo chmod +666 /dev/kvm
          sudo virsh pool-define-as default dir --target "/var/lib/libvirt/images/"
          sudo virsh pool-build default
          sudo virsh pool-start default
          sudo virsh pool-autostart default
          sudo sh -c 'printf "listen_tcp = 1\nlisten_addr = \"0.0.0.0\"\nauth_tcp = \"none\"\n" >> /etc/libvirt/libvirtd.conf'
          sudo systemctl stop libvirtd
          sudo systemctl enable --now libvirtd-tcp.socket
          sudo systemctl start libvirtd
      - name: Install requirements
        run: sudo apt install --yes libev-dev
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install tox-uv
        run: uv tool install tox --with tox-uv
      - name: Install exordos cli
        run: |
          curl -fsSL https://repository.genesis-core.tech/install.sh | sudo sh
      - name: Build exordos core
        run: |
          cd ../
          git clone -b "$CORE_BRANCH" https://github.com/exordos/exordos_core.git
          cd ./exordos_core
          export ALLOW_USER_PASSWD=true
          export FREQUENT_LOG_VACUUM=true
          exordos build -f . --manifest-var repository=https://repository.genesis-core.tech
          cd $GITHUB_WORKSPACE
      - name: Bootstrap exordos_core
        run: |
          cd ../exordos_core
          exordos bootstrap -i ./output/inventory.json -f -m core --hyper-storage-pool default --save-admin-password-file ./admin_password.txt
          export ADMIN_PASSWORD=$(cat ./admin_password.txt)
          echo "ADMIN_PASSWORD=${ADMIN_PASSWORD}" >> $GITHUB_ENV
          sudo curl http://repository.genesis-core.tech:8081/1af41041/latest/1af41041.rom --output /usr/share/qemu/1af41041.rom
          cd -
      - name: Wait for Exordos Core API
        run: |
          for i in {1..60}; do
            if curl -s -o /dev/null -w "%{http_code}" http://10.20.0.2:11010 | grep -q "200\|401\|403"; then
              echo "Exordos Core API is ready"
              exit 0
            fi
            echo "Waiting for Exordos Core API... ($i/60)"
            sleep 5
          done
          echo "Exordos Core API did not become ready"
          exit 1
      - name: Set hypervisor with overbooking
        run: |
          VM_IP=10.20.0.2
          # Get token
          ADMIN_TOKEN=$(curl --location "http://$VM_IP:11010/v1/iam/clients/00000000-0000-0000-0000-000000000000/actions/get_token/invoke" \
              --header 'Content-Type: application/x-www-form-urlencoded' \
              --data-urlencode 'grant_type=password' \
              --data-urlencode 'username=admin' \
              --data-urlencode "password=${ADMIN_PASSWORD}" \
              --data-urlencode 'client_id=GenesisCoreClientId' \
              --data-urlencode 'client_secret=GenesisCoreSecret' \
              --data-urlencode 'scope=openid' \
              --data-urlencode 'ttl=3600' | jq .access_token -r)
          echo "ADMIN_TOKEN=$ADMIN_TOKEN" >> $GITHUB_ENV
          curl --location --globoff "http://$VM_IP:11010/v1/compute/hypervisors/" \
          --header 'Content-Type: application/json' \
          --header "Authorization: Bearer $ADMIN_TOKEN" \
          --data '{
              "uuid": "63d6caf1-c452-4697-9d03-b4579612c1f5",
              "name": "hypervisor",
              "driver_spec": {
                  "driver": "libvirt",
                  "iface_mtu": 1500,
                  "network_type": "network",
                  "network": "exordos-core-net",
                  "storage_pool": "default",
                  "connection_uri": "qemu+tcp://10.20.0.1/system",
                  "machine_prefix": "dev-"
              },
              "machine_type": "VM",
              "cores_ratio": 10.0,
              "ram_ratio": 10.0
          }'
      - name: Preload dependencies in background
        run: |
          for dep in $ELEMENT_DEPS; do
            exordos -e http://10.20.0.2:11010 -u admin -p "${ADMIN_PASSWORD}" e elements install $dep
          done
      - name: Build and start PaaS
        run: |
          tox -e develop
          # TODO: to use .raw we need to patch manifest
          # export GEN_IMG_FORMAT_CORE=raw
          .tox/develop/bin/python exordos_s3/tests/functional/prepare_env.py --project-dir . --output-dir /tmp/s3aas-build --endpoint http://10.20.0.2:11010 --username admin --password "${ADMIN_PASSWORD}"
      - name: Find S3aaS CP IP
        run: |
          sleep 6
          exordos -e http://10.20.0.2:11010 -u admin -p "${ADMIN_PASSWORD}" compute nodes list
          S3AAS_CP_IP=$(exordos -e http://10.20.0.2:11010 -u admin -p "${ADMIN_PASSWORD}" compute nodes list | grep s3aas-cp | awk -F'│' '{print $7}' | tr -d ' ')
          echo "S3AAS_CP_IP=$S3AAS_CP_IP" >> $GITHUB_ENV
          echo "Found S3aaS CP IP: $S3AAS_CP_IP"
      - name: Wait for S3aaS CP API
        run: |
          for i in {1..60}; do
            if curl -s -o /dev/null -w "%{http_code}" http://${S3AAS_CP_IP}:8080 | grep -q "200\|401\|403\|404"; then
              echo "S3aaS CP API is ready"
              exit 0
            fi
            echo "Waiting for S3aaS CP API... ($i/60)"
            sudo virsh list
            sudo ls -lah /var/lib/libvirt/images/
            sleep 10
          done
          echo "S3aaS CP API did not become ready"
          exit 1
      - name: Run functional tests
        env:
          EXORDOS_ENDPOINT: http://10.20.0.2:11010
          EXORDOS_USERNAME: admin
          EXORDOS_PASSWORD: ${{ env.ADMIN_PASSWORD }}
          EXORDOS_S3_CP_URL: http://${{ env.S3AAS_CP_IP }}:8080
          EXORDOS_POLL_TIMEOUT: 600
          EXORDOS_POLL_INTERVAL: 15
        run: |
          tox -e ${PYTHON_VERSION}-functional
      - name: Setup upterm session
        uses: owenthereal/action-upterm@v1
        if: ${{ failure() }}
        with:
          limit-access-to-actor: true
          wait-timeout-minutes: 30
