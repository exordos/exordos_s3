name: build

on:
  push:
  pull_request:
    types: [opened]

env:
  PACKER_VERSION: "1.9.2"
  PYTHON_VERSION: "3.12"
  CORE_ENDPOINT_URL: http://10.20.0.2:80/api/core
  CORE_USERNAME: "admin"
  CORE_PASSWORD: "admin"
  NGINX_URL: "http://10.20.0.1:8081"

jobs:
  Build:
    runs-on: ubuntu-24.04
    if: ${{ github.actor != 'dependabot[bot]' }}
    steps:
      - name: Setup packer
        uses: hashicorp/setup-packer@main
        with:
          version: ${{ env.PACKER_VERSION }}

      - name: Install exordos CLI
        run: curl -fsSL https://repo.exordos.com/install.sh | sudo sh

      - name: Install hypervisor
        run: |
          sudo exordos compute hypervisors init
          sudo chmod 666 /dev/kvm

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv + tox + build
        uses: astral-sh/setup-uv@v7
      - run: |
          uv tool install tox --with tox-uv
          pip install build

      - name: Build exordos_s3
        timeout-minutes: 20
        run: |
          set -eux
          exordos build --output-dir /tmp/s3aas-build $(pwd)
          VERSION="$(jq -r '.version' /tmp/s3aas-build/exordos-elements/s3aas/*/inventory.json | head -1)"
          echo "S3AAS_VERSION=${VERSION}" >> $GITHUB_ENV
          echo "S3AAS_BUILD_DIR=/tmp/s3aas-build" >> $GITHUB_ENV

      - name: Configure exordos settings
        run: |
          exordos settings set-realm default --endpoint $CORE_ENDPOINT_URL
          exordos settings set-context default --name default --user $CORE_USERNAME --password $CORE_PASSWORD

      - name: Bootstrap exordos_core
        run: exordos bootstrap -i latest -f -m core --admin-password $CORE_PASSWORD --cidr 10.20.0.0/22

      - name: Wait for Exordos Core API
        run: |
          for i in {1..60}; do
            if exordos ready_api; then
              echo "Exordos Core API is ready"
              break
            fi
            echo "Waiting for Exordos Core API... ($i/60)"
            sleep 5
          done

      - name: Set hypervisor with overbooking
        run: |
          HYPER_UUID="$(exordos c h l -o json | jq -r .[0]."uuid")"
          exordos compute hypervisors update $HYPER_UUID --cores-ratio 10.0 --ram-ratio 10.0

      - name: Install requirements
        run: sudo apt update && sudo apt install --yes libev-dev nginx

      - name: Setup nginx
        run: |
          sudo tee /etc/nginx/sites-available/s3aas-ci > /dev/null <<'EOF'
          server {
              listen 8081;
              root /srv/nginx;
              autoindex on;
          }
          EOF
          sudo ln -sf /etc/nginx/sites-available/s3aas-ci /etc/nginx/sites-enabled/s3aas-ci
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo mkdir -p /srv/nginx
          sudo chown -R "$USER:$USER" /srv/nginx
          sudo systemctl enable --now nginx

      - name: Populate nginx + build wheel
        run: |
          cp -r "$S3AAS_BUILD_DIR/." /srv/nginx/
          mkdir -p /srv/nginx/simple
          python -m build --wheel --outdir /srv/nginx/simple/

      - name: Patch manifest for CI
        run: |
          MF=/srv/nginx/exordos-elements/s3aas/$S3AAS_VERSION/manifests/s3aas.yaml
          sed -i 's|index_url: ""|index_url: "'"$NGINX_URL"'/simple/"|' "$MF"
          sed -i 's|image: "https://repo.exordos.com/exordos-elements/|image: "'"$NGINX_URL"'/exordos-elements/|' "$MF"
          grep -E 'index_url|image:' "$MF"

      - name: Install elements + wait
        run: |
          python exordos_s3/tests/functional/prepare_env.py \
            --skip-build \
            --no-http-server \
            --repository "$NGINX_URL/exordos-elements" \
            --s3aas-version "$S3AAS_VERSION" \
            --output-dir /tmp/metapaas-s3-build \
            --endpoint $CORE_ENDPOINT_URL \
            --username $CORE_USERNAME \
            --password "$CORE_PASSWORD" \
            --wait-timeout 600 \
            2>&1 | tee /tmp/prepare_env.log

          grep "^  export " /tmp/prepare_env.log | sed 's/^  export //' >> $GITHUB_ENV

      - name: Wait for S3 API
        run: |
          for i in {1..30}; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "${EXORDOS_S3_CP_URL}/v1/" || true)
            if echo "$CODE" | grep -qE "200|404"; then
              echo "MetaPaaS user-api ready (HTTP $CODE)"; exit 0
            fi
            echo "Waiting ($i/30) for user-api… (got '$CODE')"; sleep 10
          done
          exit 1

      - name: Run functional tests
        run: tox -e ${{ env.PYTHON_VERSION }}-functional

      - name: Push exordos_s3
        env:
          PUSH_EXORDOS_CFG: ${{ secrets.PUSH_EXORDOS_CFG }}
        run: |
          echo "$PUSH_EXORDOS_CFG" | base64 -d > exordos/exordos.push.yaml
          exordos push -c exordos/exordos.push.yaml -e $S3AAS_BUILD_DIR -t exordos_repo -f --latest

      - name: Debug session on failure
        uses: owenthereal/action-upterm@v1
        if: failure()
        with:
          limit-access-to-actor: true
          wait-timeout-minutes: 30
