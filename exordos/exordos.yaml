build:
  deps:
    - dst: /opt/exordos_metapaas
      path:
        src: ../../exordos_s3
      exclude:
        - .venv
        - .tox
        - output

  elements:
    # Communal shared S3 instance for platform-wide use.
    - manifest: manifests/communal_s3.yaml.j2

    # Example consumer element: declaratively creates an s3 instance + bucket.
    - manifest: manifests/example_s3.yaml.j2

    # s3 dataplane image (launched per s3 instance by the infra builder)
    - manifest: manifests/s3aas.yaml.j2
      images:
      - name: exordos-metapaas-s3-dp
        format: GEN_IMG_FORMAT_CORE=zst
        profile: exordos_base
        script: images/dp_install.sh
        override:
          disk_size: "6G"
          use_backing_file: true
