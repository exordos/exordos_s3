# Build section. It specifies the build process of the project
build:

  # Dependencies of the project
  deps:
    - dst: /opt/exordos_s3
      path:
        src: ../../exordos_s3
      exclude:
        - .venv
        - .tox

    # Take SDK from a local path for development purposes.
    - dst: /opt/gcl_sdk
      optional: true
      path:
        env: LOCAL_GENESIS_SDK_PATH

  # List of elements in the project
  elements:
    # List of images in the element
    - manifest: manifests/s3aas.yaml.j2
      images:
      - name: exordos-s3
        format: GEN_IMG_FORMAT_CORE=gz
        profile: exordos_base
        script: images/cp_install.sh

        # Override image build parameters, for instance disk size
        override:
          disk_size: "6G"
      - name: exordos-s3-dp
        format: GEN_IMG_FORMAT_CORE=gz
        profile: exordos_base
        script: images/dp_install.sh

        # Override image build parameters, for instance disk size
        override:
          disk_size: "6G"
          use_backing_file: true
    - manifest: manifests/communal_s3.yaml.j2
    - manifest: manifests/s3_example.yaml.j2
